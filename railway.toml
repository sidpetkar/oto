[build]
buildCommand = "corepack enable && corepack prepare pnpm@latest --activate && pnpm install --frozen-lockfile && pnpm --filter @oto/protocol build && pnpm --filter @oto/relay build"

[deploy]
startCommand = "node apps/relay/dist/index.js"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
